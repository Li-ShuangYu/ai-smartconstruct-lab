spring.application.name=backend-core

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/ai-smartconstruct-lab?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# JWT Configuration
jwt.secret=smartconstruct-jwt-secret-key-2026-must-be-at-least-256bits-long!!
jwt.expiration=86400000

spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB

# File Upload
file.upload-dir=${user.dir}/infrastructure/uploads

# MyBatis-Plus Configuration
mybatis-plus.mapper-locations=classpath*:mapper/**/*.xml
mybatis-plus.type-aliases-package=com.smartconstruct.backend_core.entity
